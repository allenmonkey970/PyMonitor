services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8765:8765"
    environment:
      PORT: 8765
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
